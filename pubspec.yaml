name: watchtogether
description: "WatchTogether — synchronized watch party application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # State management — see README.md "Architecture Decisions" for rationale
  flutter_riverpod: ^2.5.1

  # Declarative navigation
  go_router: ^14.2.0

  # Typography (Poppins)
  google_fonts: ^6.2.1

  # Localization / i18n
  intl: ^0.20.2

  # Lightweight persistence for user preferences (locale, theme, etc.)
  shared_preferences: ^2.2.3

  # Encrypted persistence for sensitive data (auth session, premium cache)
  flutter_secure_storage: ^9.2.2

  # Value equality for models, without hand-writing == / hashCode
  equatable: ^2.0.5

  # Combines multiple Firestore document streams (e.g. N friends' live
  # presence) into one live list via Rx.combineLatestList — used by the
  # Friends screen (Phase 3.9) so online/away/offline status updates in
  # real time without any manual re-fetch/refresh.
  rxdart: ^0.28.0

  # Native share sheet — used by the Friends screen's "Invite Friends"
  # card to share the invite link through the OS share UI.
  share_plus: ^12.0.1

  # Opens external URLs — used by the drawer's "Rate App" entry to open
  # the Google Play Store listing directly, and by Settings/About for
  # support links.
  url_launcher: ^6.3.1

  # Reads the real installed app version/build number (splash screen),
  # so the displayed version can never drift out of sync with what was
  # actually built/shipped.
  package_info_plus: ^8.0.0

  # Google Play Billing (Android) for real subscription purchases on the
  # Premium screen (Phase 3.11) — see lib/services/purchase_service.dart
  # and lib/core/constants/subscription_products.dart. iOS StoreKit isn't
  # wired up yet; this app targets Android-only premium purchases for now.
  in_app_purchase: ^3.2.0

  # Profile photo picking for My Profile's Account Information section
  # (paired with the already-present firebase_storage for the upload).
  image_picker: ^1.1.2

  # Real video playback engine for the Video Player screen (Phase 4
  # P0 fix) — replaces the previous locally-ticking-clock placeholder.
  # On Android this delegates to ExoPlayer, which handles both
  # progressive MP4 and HLS (.m3u8) playback without needing a second
  # package; the screen's own custom controls overlay is unchanged, this
  # only supplies the decoded video surface + playback engine.
  video_player: ^2.9.2

  # --- Firebase ---
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_messaging: ^15.0.4
  firebase_analytics: ^11.2.1
  firebase_crashlytics: ^4.0.4
  firebase_remote_config: ^5.0.4
  # Prepared, not used yet (per spec): no upload/download call sites exist
  # in Phase 2, but the dependency + service scaffolding are ready so
  # Phase 3 can add file uploads without touching this layer.
  firebase_storage: ^12.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Generate the Android app icon from assets/logo/app_logo.png once that
  # file is added (see assets/logo/README.md). Not run in Phase 2 — no
  # UI/icon output is produced by this phase, only the config below is
  # prepared so a single command does it later:
  #   flutter pub run flutter_launcher_icons
  flutter_launcher_icons: ^0.13.1

  # Generates the native splash screen from assets/logo/app_logo.png once
  # that file is added. Not run in Phase 2, config only:
  #   flutter pub run flutter_native_splash:create
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  # Enables `flutter gen-l10n` to generate AppLocalizations from the ARB
  # files in lib/core/localization/l10n/ (see l10n.yaml).
  generate: true

  assets:
    - assets/logo/
    - assets/icons/
    - assets/illustrations/
    - assets/animations/
    - assets/images/

  # NOTE: Poppins is loaded at runtime via the `google_fonts` package, so no
  # font assets are bundled in Phase 1. If/when the app needs to work fully
  # offline (no font fetch on first run), download the static Poppins .ttf
  # files into assets/fonts/ and register a `fonts:` section here — see
  # assets/fonts/README.md for the exact steps.

# --- App icon generation (flutter_launcher_icons) ---
# Requires assets/logo/app_logo.png to exist (see assets/logo/README.md).
# Run once the file is added: `flutter pub run flutter_launcher_icons`
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo/app_logo.png"
  min_sdk_android: 23
  adaptive_icon_background: "#0B0B12"
  adaptive_icon_foreground: "assets/logo/app_logo.png"

# --- Native splash screen generation (flutter_native_splash) ---
# Requires assets/logo/app_logo.png to exist (see assets/logo/README.md).
# Run once the file is added: `flutter pub run flutter_native_splash:create`
# This only prepares the *native* splash (the branded screen shown before
# Flutter/Dart is running) — the in-app splash screen widget itself is a
# Phase 3 UI concern.
flutter_native_splash:
  color: "#0B0B12"
  image: "assets/logo/app_logo.png"
  android_12:
    color: "#0B0B12"
    image: "assets/logo/app_logo.png"

