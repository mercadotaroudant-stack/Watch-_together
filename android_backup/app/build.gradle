plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
    // Optional at build time — only actually reports if firebase_crashlytics
    // is present, which it is (see pubspec.yaml / lib/core/helpers/app_logger.dart).
    id "com.google.firebase.crashlytics"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

android {
    // Matches android/app/google-services.json's android_client_info ->
    // package_name exactly — do not change without also regenerating
    // google-services.json from the Firebase console, or Google/Firebase
    // sign-in and Crashlytics will silently stop matching this app.
    namespace "com.watchtogether.app"
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    defaultConfig {
        applicationId "com.watchtogether.app"
        // firebase_auth 5.x / recent Firebase Android SDKs require 23+.
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    buildTypes {
        release {
            // TODO(release): replace with a real release signing config
            // before shipping to Play — debug signing is only here so
            // `flutter build apk --release` doesn't fail with no config.
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:$kotlin_version"
    implementation "com.android.support:multidex:1.0.3"
    // Firebase BoM — keeps every com.google.firebase:* artifact pulled in
    // transitively by the FlutterFire plugins on matching versions.
    implementation platform("com.google.firebase:firebase-bom:33.1.2")
}
